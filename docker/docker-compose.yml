services:
  # ----------------------------
  # Service 1: Apache + PHP
  # ----------------------------
  gaming-center_apache-php:
    build: .  # Build from Dockerfile
    container_name: gaming-center_apache-php  # Explicit container name (optional, but makes docker ps easier)
    volumes:
      - ./../app/:/var/www/html   # Mount host code (../backend/) into /var/www/html inside container
                                      # -> This lets you edit code locally and see changes instantly
    ports:
      - "${APP_PORT}:80"              # Expose container's Apache port (80) on host port defined in .env (APP_PORT)
    depends_on:
      - gaming-center_db                      # Ensure DB container starts before Apache+PHP

  # ----------------------------
  # Service 2: Database (MariaDB)
  # ----------------------------
  gaming-center_db:
    image: mariadb:11.4               # Official MariaDB LTS image (open-source, drop-in MySQL replacement)
    container_name: gaming-center_mariadb
    restart: always                   # Always restart if container stops (good for production-like environments)
    environment:
      # Credentials are pulled from the .env file
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}  # Root password
      MARIADB_DATABASE: ${MARIADB_DATABASE}            # Default DB to create on startup
      MARIADB_USER: ${MARIADB_USER}                    # Application user
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}            # Password for that user
    volumes:
      - ./../db_data:/var/lib/mysql   # Bind mount: stores DB files in ../db_data on host machine
                                      # -> Ensures data persists even if container is removed

  # ----------------------------
  # Service 3: phpMyAdmin (DB Web UI)
  # ----------------------------
  gaming-center_phpmyadmin:
    image: phpmyadmin:latest          # Official phpMyAdmin image (works with MySQL/MariaDB)
    container_name: gaming-center_phpmyadmin
    restart: always
    ports:
      - "${PHPMYADMIN_PORT}:80"       # Map phpMyAdmin web interface to host port (defined in .env)
                                      # Example: http://localhost:26011
    environment:
      PMA_HOST: gaming-center_db              # Tells phpMyAdmin which DB service to connect to (by service name)
      PMA_USER: ${MARIADB_USER}       # Default login user (can also log in as root)
      PMA_PASSWORD: ${MARIADB_PASSWORD}
    depends_on:
      - gaming-center_db                      # Ensure DB starts before phpMyAdmin
